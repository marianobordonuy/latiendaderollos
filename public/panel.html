<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>La Tienda de Rollos — Panel de Scans</title>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial;
background:#f6f6f6;
display:flex;
align-items:center;
justify-content:center;
min-height:100vh;
padding:20px;
}

.container{
background:white;
padding:40px;
border-radius:12px;
width:420px;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
text-align:center;
}

.header{
display:flex;
align-items:center;
justify-content:space-between;
margin-bottom:25px;
}

h1{
font-size:20px;
}

.logout{
margin-top:0;
padding:6px 12px;
font-size:12px;
background:#eee;
color:#555;
border-radius:6px;
border:none;
cursor:pointer;
}

.field{
text-align:left;
margin-bottom:18px;
}

.field label{
display:block;
font-size:12px;
color:#666;
margin-bottom:6px;
}

.field input{
width:100%;
padding:9px 10px;
border:1px solid #ddd;
border-radius:6px;
font-size:14px;
}

.hint{
font-size:11px;
color:#999;
margin-top:4px;
}

.dropzone{
border:2px dashed #bbb;
border-radius:10px;
padding:50px 20px;
cursor:pointer;
transition:.2s;
}

.dropzone.drag{
border-color:#000;
background:#fafafa;
}

input[type=file]{
display:none;
}

button.main{
margin-top:20px;
padding:10px 18px;
border:none;
border-radius:6px;
background:black;
color:white;
cursor:pointer;
font-size:14px;
width:100%;
}

button:disabled{
opacity:.4;
cursor:default;
}

button:not(:disabled):hover{
opacity:.85;
}

.progress{
margin-top:20px;
width:100%;
height:8px;
background:#eee;
border-radius:6px;
overflow:hidden;
display:none;
}

.bar{
height:100%;
width:0%;
background:black;
transition:width .2s;
}

.result{
margin-top:20px;
font-size:14px;
word-break:break-all;
}

.copy{
background:#eee;
color:#000;
}

.log{
margin-top:20px;
background:#111;
color:#0f0;
font-family:monospace;
font-size:12px;
padding:12px;
border-radius:6px;
height:140px;
overflow:auto;
text-align:left;
}

</style>
</head>

<body>

<div class="container">

<div class="header">
  <h1>Subir Scans</h1>
  <a href="/logout"><button class="logout">Salir</button></a>
</div>

<div class="field">
  <label>Código de orden (opcional)</label>
  <input id="orderCode" placeholder="ej: A4F92C o twin check">
  <div class="hint">Vincula el zip a una orden del dashboard.</div>
</div>

<div class="field">
  <label>Email del cliente (opcional)</label>
  <input id="email" placeholder="cliente@email.com">
  <div class="hint">Si lo completás, se le manda el link automáticamente.</div>
</div>

<div class="dropzone" id="dropzone">
Arrastrá la carpeta de scans<br><br>
o click para seleccionar
</div>

<input type="file" id="files"
  webkitdirectory
  directory
  multiple
  accept=".jpg,.jpeg,.png,.tif,.tiff,.dng,.nef,.cr2,.arw,.raf,.rw2">

<button class="main" id="uploadBtn" onclick="upload()">Subir carpeta</button>

<div class="progress">
<div class="bar" id="bar"></div>
</div>

<div class="result" id="result"></div>

<button class="copy" id="copyBtn" style="display:none">
Copiar link
</button>

<div class="log" id="logBox"></div>

</div>

<script>

const dropzone = document.getElementById("dropzone")
const input = document.getElementById("files")
const uploadBtn = document.getElementById("uploadBtn")

const allowedExtensions = [
  "jpg","jpeg","png","tif","tiff",
  "dng","nef","cr2","arw","raf","rw2"
]

dropzone.onclick = () => input.click()

dropzone.addEventListener("dragover", e => {
  e.preventDefault()
  dropzone.classList.add("drag")
})

dropzone.addEventListener("dragleave", () => {
  dropzone.classList.remove("drag")
})

dropzone.addEventListener("drop", e => {
  e.preventDefault()
  input.files = e.dataTransfer.files
  dropzone.classList.remove("drag")
})

function log(msg) {
  const box = document.getElementById("logBox")
  const time = new Date().toLocaleTimeString()
  box.innerHTML += "[" + time + "] " + msg + "<br>"
  box.scrollTop = box.scrollHeight
}

async function upload() {
  const files = input.files

  if (!files.length) {
    alert("Seleccioná una carpeta primero")
    return
  }

  for (const file of files) {
    const ext = file.name.split(".").pop().toLowerCase()
    if (!allowedExtensions.includes(ext)) {
      log("archivo bloqueado: " + file.name)
      alert("Archivo no permitido: " + file.name)
      return
    }
  }

  uploadBtn.disabled = true
  log("iniciando upload...")
  log(files.length + " archivos detectados")

  const orderCode = document.getElementById("orderCode").value.trim()
  const email = document.getElementById("email").value.trim()

  /* generar data.txt con la metadata */

  let dataTxt = ""
  if (orderCode) dataTxt += "order_code: " + orderCode + "\n"
  if (email) dataTxt += "email: " + email + "\n"

  const formData = new FormData()

  for (const file of files) {
    formData.append("files", file)
  }

  if (dataTxt) {
    const dataBlob = new Blob([dataTxt], { type: "text/plain" })
    formData.append("files", dataBlob, "data.txt")
  }

  document.querySelector(".progress").style.display = "block"

  const xhr = new XMLHttpRequest()
  xhr.open("POST", "/upload")

  xhr.upload.onprogress = e => {
    if (e.lengthComputable) {
      const percent = (e.loaded / e.total) * 100
      document.getElementById("bar").style.width = percent + "%"
      if (Math.round(percent) % 10 === 0) {
        log("subiendo: " + Math.round(percent) + "%")
      }
    }
  }

  xhr.onload = () => {
    uploadBtn.disabled = false
    if (xhr.status !== 200) {
      log("error del servidor: " + xhr.responseText)
      return
    }
    const res = JSON.parse(xhr.responseText)
    log("link generado")

    if (res.linkedOrder) {
      log("vinculado a orden: " + res.linkedOrder)
    } else if (orderCode) {
      log("aviso: el código " + orderCode + " no se encontró en órdenes")
    }

    document.getElementById("result").innerHTML =
      `Link generado:<br><a href="${res.link}" target="_blank">${res.link}</a>`

    const copyBtn = document.getElementById("copyBtn")
    copyBtn.style.display = "inline-block"
    copyBtn.onclick = () => {
      navigator.clipboard.writeText(res.link)
      copyBtn.innerText = "Copiado ✓"
    }
  }

  xhr.onerror = () => {
    uploadBtn.disabled = false
    log("error de red en upload")
  }

  xhr.send(formData)
}

// Poll server logs
let logCursor = 0

async function pollStatus() {
  try {
    const res = await fetch("/scan-status?since=" + logCursor)
    if (res.status === 401) return
    const data = await res.json()
    for (const entry of data.logs) {
      log("[server] " + entry.msg)
    }
    logCursor = data.next
  } catch (e) {}
}

setInterval(pollStatus, 2000)

</script>

</body>
</html>
